          required: false
          schema:
            type: string
        - name: sortDesc
          in: query
          description: Sort in descending order when true.
          required: false
          schema:
            type: boolean
            default: false
        - name: queryString
          in: query
          description: >
            URL-encoded DSL filter string. Supports operators such as `contain`,
            `not-contain`, `=`, and `!=` over the available searchable
            properties (e.g. creationDate, referenceCode, keywords). Example:
            `referenceCode = <referenceCode>`.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPaperResponse"
        "400":
          description: Invalid query parameters.
        "401":
          description: Invalid or missing authentication token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Action forbidden.
          content:
            application/json:
