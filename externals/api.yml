openapi: 3.0.3
info:
  title: ATLAS Analysis and Documents API
  description: API for ATLAS Publication Tracking system.
  version: 1.0.0
  contact:
    email: atlas-fence-developers@cern.ch
    name: ATLAS Glance developers

servers:
  - url: "/atlas/analysis/api"
    description: Analysis and Documents API

tags:
  - name: Publication
  - name: Analysis
  - name: Paper
  - name: Confnote
  - name: Pubnote
  - name: Leadgroup
  - name: Subgroup
  - name: Trigger

paths:
  /searchAnalysis:
    get:
      tags:
        - Analysis
      summary: Search analyses
      description: >
        Searches analyses with support for filtering, sorting, and pagination.
        Filters are passed as a DSL query string via the `queryString`
        parameter.

        The same DSL is used across the `/search...` endpoints in this API. What
        changes between resources is the set of searchable field names
        documented on each endpoint.
      operationId: searchAnalysis
      security:
        - oauth2: []
      parameters:
        - name: offset
          in: query
          description: Pagination offset (number of records to skip).
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          required: false
          schema:
            type: integer
            default: 50
        - name: sortBy
          in: query
          description: Field name to sort results by.
          required: false
          schema:
            type: string
        - name: sortDesc
          in: query
          description: Sort in descending order when true.
          required: false
          schema:
            type: boolean
            default: false
        - name: queryString
          in: query
          description: |
            URL-encoded DSL filter string.

            <details>
            <summary>See DSL syntax</summary>

            <ul>
              <li>Statements are written as <code>"fieldName" operator "value"</code>.</li>
              <li>Supported conjunctions are uppercase <code>AND</code> and <code>OR</code>.</li>
              <li>Parentheses <code>(</code> and <code>)</code> are supported for grouping.</li>
              <li>Field names are case-sensitive and must match the names below exactly.</li>
              <li>Operators are case-sensitive. This endpoint supports <code>contain</code>, <code>not-contain</code>, <code>=</code>, and <code>!=</code>.</li>
              <li>String matching is not case-sensitive for <code>contain</code>, <code>not-contain</code>, <code>=</code>, and <code>!=</code>.</li>
              <li>Fields and values must stay inside double quotes, and the whole <code>queryString</code> parameter must be URL-encoded when sent over HTTP.</li>
              <li>The parser does not define an escape syntax for embedded double quotes. Values containing <code>"</code> are therefore not supported.</li>
              <li>To compare against <code>NULL</code>, use the special token <code>__EMPTY__</code>, for example <code>"publicShortTitle" = "__EMPTY__"</code>.</li>
            </ul>

            </details>

            <details>
            <summary>See searchable fields for <code>/searchAnalysis</code></summary>

            <ul>
              <li><code>creationDate</code></li>
              <li><code>status</code></li>
              <li><code>shortTitle</code></li>
              <li><code>publicShortTitle</code></li>
              <li><code>referenceCode</code></li>
              <li><code>groups.leadingGroup.name</code></li>
              <li><code>groups.subgroups.name</code></li>
              <li><code>groups.otherGroups.name</code></li>
              <li><code>amiGlance.label</code></li>
              <li><code>amiGlance.url</code></li>
              <li><code>documentation.repositories.gitlabId</code></li>
              <li><code>documentation.repositories.type</code></li>
              <li><code>documentation.repositories.url</code></li>
              <li><code>documentation.supportingInternalDocuments.label</code></li>
              <li><code>documentation.supportingInternalDocuments.url</code></li>
              <li><code>analysisTeam.cernCcid</code></li>
              <li><code>analysisTeam.firstName</code></li>
              <li><code>analysisTeam.lastName</code></li>
              <li><code>analysisTeam.email</code></li>
              <li><code>analysisTeam.isContactEditor</code> (<code>=</code> and <code>!=</code> only)</li>
              <li><code>analysisTeam.isAnalysisContact</code> (<code>=</code> and <code>!=</code> only)</li>
              <li><code>analysisTeam.analysisContactAssignments.startDate</code></li>
              <li><code>analysisTeam.analysisContactAssignments.endDate</code></li>
              <li><code>metadata.collisions.type</code></li>
              <li><code>metadata.collisions.year</code></li>
              <li><code>metadata.collisions.run</code></li>
              <li><code>metadata.collisions.ecmValue</code></li>
              <li><code>metadata.collisions.ecmUnit</code></li>
              <li><code>metadata.collisions.luminosityValue</code></li>
              <li><code>metadata.collisions.luminosityUnit</code></li>
              <li><code>metadata.keywords.name</code></li>
              <li><code>metadata.statTools.name</code></li>
              <li><code>metadata.mvaMlTools.name</code></li>
              <li><code>metadata.triggers.name</code></li>
              <li><code>metadata.analysisFramework.ntupling</code></li>
              <li><code>metadata.analysisFramework.histogramming</code></li>
              <li><code>metadata.datasets.name</code></li>
              <li><code>extraMetadata</code></li>
              <li><code>relatedPublications.type</code></li>
              <li><code>relatedPublications.referenceCode</code></li>
              <li><code>phase0.startDate</code></li>
              <li><code>phase0.state</code></li>
              <li><code>phase0.eoiMeeting.title</code></li>
              <li><code>phase0.eoiMeeting.date</code></li>
              <li><code>phase0.eoiMeeting.comments</code></li>
              <li><code>phase0.eoiMeeting.label</code></li>
              <li><code>phase0.eoiMeeting.url</code></li>
              <li><code>phase0.mainPhysicsAim</code></li>
              <li><code>phase0.datasetUsed</code></li>
              <li><code>phase0.modelTested</code></li>
              <li><code>phase0.methods</code></li>
              <li><code>phase0.editorialBoardRequestMeeting.title</code></li>
              <li><code>phase0.editorialBoardRequestMeeting.date</code></li>
              <li><code>phase0.editorialBoardRequestMeeting.comments</code></li>
              <li><code>phase0.editorialBoardRequestMeeting.label</code></li>
              <li><code>phase0.editorialBoardRequestMeeting.url</code></li>
              <li><code>phase0.editorialBoard.cernCcid</code></li>
              <li><code>phase0.editorialBoard.firstName</code></li>
              <li><code>phase0.editorialBoard.lastName</code></li>
              <li><code>phase0.editorialBoard.email</code></li>
              <li><code>phase0.editorialBoard.isChair</code> (<code>=</code> and <code>!=</code> only)</li>
              <li><code>phase0.editorialBoard.isExOfficio</code> (<code>=</code> and <code>!=</code> only)</li>
              <li><code>phase0.editorialBoardFormedDate</code></li>
              <li><code>phase0.preApprovalMeeting.title</code></li>
              <li><code>phase0.preApprovalMeeting.date</code></li>
              <li><code>phase0.preApprovalMeeting.comments</code></li>
              <li><code>phase0.preApprovalMeeting.label</code></li>
              <li><code>phase0.preApprovalMeeting.url</code></li>
              <li><code>phase0.approvalMeeting.title</code></li>
              <li><code>phase0.approvalMeeting.date</code></li>
              <li><code>phase0.approvalMeeting.comments</code></li>
              <li><code>phase0.approvalMeeting.label</code></li>
              <li><code>phase0.approvalMeeting.url</code></li>
              <li><code>phase0.pgcOrSgcSignOffDate</code></li>
            </ul>

            </details>

            Examples:
            - `"referenceCode" = "ANA-TEST-INT-1"`
            - `"status" = "Phase 0 Active" AND "metadata.keywords.name" contain "Higgs"`
            - `("groups.leadingGroup.name" = "SUSY" OR "groups.leadingGroup.name" = "EXOT") AND "phase0.state" != "closed"`
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchAnalysisResponse"
        "400":
          description: Invalid query parameters.
        "401":
          description: Invalid or missing authentication token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Action forbidden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
