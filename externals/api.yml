      summary: Search publication
      description: >
        Searches across all publication types (Analysis, Paper, CONF note, PUB
        note) with support for filtering, sorting, and pagination. Filters are
        passed as a DSL query string via the `queryString` parameter.


        The same DSL is used across the `/search...` endpoints in this API. What
        changes between resources is the set of searchable field names
        documented on each endpoint.


        **Search by reference code**


        Publications can have two kinds of reference codes depending on their
        type. Analyses and Papers have a single permanent reference code (e.g.
        `ANA-SUSY-2018-04`). CONF notes and PUB notes start with a temporary
        reference code (e.g. `CONF-SUSY-2018-04`) and later receive a final
        reference code (e.g. `ATLAS-CONF-2019-018`) once approved.


        The `referenceCode` filter field covers all cases — pass any code
        (temporary or final) and the API will match it against whichever code is
        applicable for each publication type.
