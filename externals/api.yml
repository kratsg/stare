openapi: 3.0.3
info:
  title: ATLAS Analysis and Documents API
  description: API for ATLAS Publication Tracking system.
  version: 1.0.0
  contact:
    email: atlas-fence-developers@cern.ch
    name: ATLAS Glance developers

servers:
  - url: "/atlas/analysis/api"
    description: Analysis and Documents API

tags:
  - name: Analysis
  - name: Paper
  - name: Confnote

paths:
  /searchAnalysis:
    get:
      tags:
        - Analysis
      summary: Search analyses
      description: >
        Searches analyses with support for filtering, sorting, and pagination.
        Filters are passed as a DSL query string via the `queryString`
        parameter.
      operationId: searchAnalysis
      security:
        - oauth2: []
      parameters:
        - name: offset
          in: query
          description: Pagination offset (number of records to skip).
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          required: false
          schema:
            type: integer
            default: 50
        - name: sortBy
          in: query
          description: Field name to sort results by.
          required: false
          schema:
            type: string
        - name: sortDesc
          in: query
          description: Sort in descending order when true.
          required: false
          schema:
            type: boolean
            default: false
        - name: queryString
          in: query
          description: >
            URL-encoded DSL filter string. Supports operators such as `contain`,
            `not-contain`, `=`, and `!=` over the available searchable
            properties (e.g. creationDate, referenceCode, keywords). Example:
            `referenceCode = <referenceCode>`.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchAnalysisResponse"
        "400":
          description: Invalid query parameters.
        "401":
          description: Invalid or missing authentication token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error401"
        "403":
          description: Action forbidden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error403"
  /searchPaper:
    get:
      tags:
        - Paper
      summary: Search paper
      description: >
        Searches papers with support for filtering, sorting, and pagination.
        Filters are passed as a DSL query string via the `queryString`
        parameter.
