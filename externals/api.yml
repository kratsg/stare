  /searchConfnote:
    get:
      tags:
        - Confnote
      summary: Search confnotes
      description: >
        Searches confnotes with support for filtering, sorting, and pagination.
        Filters are passed as a DSL query string via the `queryString`
        parameter.
      operationId: searchConfnote
      security:
        - oauth2: []
      parameters:
        - name: offset
          in: query
          description: Pagination offset (number of records to skip).
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          required: false
          schema:
            type: integer
            default: 50
        - name: sortBy
          in: query
          description: Field name to sort results by.
          required: false
          schema:
            type: string
        - name: sortDesc
          in: query
          description: Sort in descending order when true.
          required: false
          schema:
            type: boolean
            default: false
        - name: queryString
          in: query
          description: >
            URL-encoded DSL filter string. Supports operators such as `contain`,
            `not-contain`, `=`, and `!=` over the available searchable
            properties (e.g. status, temporaryReferenceCode, metadata.keywords,
            phase1.state). Example: `temporaryReferenceCode =
            <temporaryReferenceCode>`.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchConfnoteResponse"
        "400":
          description: Invalid query parameters.
        "401":
          description: Invalid or missing authentication token.
          content:
