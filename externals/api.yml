              <li>Parentheses <code>(</code> and <code>)</code> are supported for grouping.</li>
              <li>Field names are case-sensitive and must match the names below exactly.</li>
              <li>Operators are case-sensitive. This endpoint supports <code>contain</code>, <code>not-contain</code>, <code>=</code>, and <code>!=</code>.</li>
              <li>String matching is not case-sensitive for <code>contain</code>, <code>not-contain</code>, <code>=</code>, and <code>!=</code>.</li>
              <li>Fields and values must stay inside double quotes, and the whole <code>queryString</code> parameter must be URL-encoded when sent over HTTP.</li>
              <li>The parser does not define an escape syntax for embedded double quotes. Values containing <code>"</code> are therefore not supported.</li>
              <li>To compare against <code>NULL</code>, use the special token <code>__EMPTY__</code>, for example <code>"shortTitle" = "__EMPTY__"</code>.</li>
            </ul>

            </details>

            <details>
            <summary>See searchable fields for <code>/searchPublication</code></summary>

            <ul>
              <li><code>referenceCode</code></li>
              <li><code>type</code></li>
              <li><code>status</code></li>
              <li><code>shortTitle</code></li>
              <li><code>groups.leadingGroup</code></li>
              <li><code>groups.subgroups</code></li>
            </ul>

            </details>

